# ==========================================
# 階段任務 (Stages)
# ==========================================
stages:
  - lint       # 程式碼品質與靜態檢查
  - test       # 單元測試與整合測試
  - build      # 打包成映像檔並推送到 Registry
#  - deploy     # 部署到測試或生產環境


# ==========================================
# 全局全域設定 (Global Settings)
# ==========================================
variables:
  # 指定 Python 基礎映像檔版本
  PYTHON_IMAGE: "python:3.12-slim"

  # 指定 Docker-in-Docker 版本（ Build 階段 ）
  DOCKER_IMAGE: "docker:24.0.5"
  DOCKER_DIND_IMAGE: "docker:24.0.5-dind"

  # 專案映像檔名稱
  IMAGE_NAME: "airflow-dags"
  IMAGE_TAG: "v1"

  # 透過 GitLab 變數控管 Registry 位址
#  REGISTRY_HOST: "host.docker.internal:5100"
  REGISTRY_HOST: "192.168.0.15:5100"


# ==========================================
# 定義全域快取: 避免每個 Job 都要重新 pip install
# ==========================================
cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip
    - venv/


# ==========================================
# 1. Lint Stage (程式碼品質檢查)
# ==========================================
lint:python:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - python -V
    # 安裝 pre-commit（被快取，下次速度極快）
    - pip install pre-commit

  script:
    # 1. pre-commit 內部需要 git 指令來判斷哪些檔案有改動
    - which git || (apt-get update && apt-get install -y git)
    # 2. 執行 pre-commit 檢查所有檔案
    - pre-commit run --all-files

  allow_failure: false # 若檢查不通過，直接阻斷後續 Pipeline


# ==========================================
# 2. Test Stage (自動化測試)
# ==========================================
test:unit:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    # sqlite => Airflow 測試底層依賴
    - apt-get update && apt-get install -y sqlite3 libsqlite3-dev
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pytest pytest-cov
  script:
    # 1. 設定 PYTHONPATH 使測試腳本找得到 dags
    - export PYTHONPATH=.:dags

    # 2. 讓 Airflow 在測試時使用當前目錄作為主目錄，避免去污染系統路徑
    - export AIRFLOW_HOME=$(pwd)/.airflow

    # 3. 執行 pytest 測試 tests/ 目錄
    - pytest --cov=dags tests/ --cov-report=term-missing

  coverage: '/(?i)total.*?([\d\.]+)%/'
  artifacts:
    name: "coverage-report-$CI_COMMIT_REF_NAME"
    paths:
      - htmlcov/ # 如果 pytest 沒產生，可以先註解掉或保留

    expire_in: 1 week

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ==========================================
# 3. Build Stage (容器化 + 推送至 Registry)
# ==========================================
build:docker:
  stage: build
  image: $DOCKER_IMAGE
  services:
    - name: $DOCKER_DIND_IMAGE
      alias: docker
      command: ["--insecure-registry=host.docker.internal:5100"]
  variables:
    # 解決 DIND 環境下的 TLS 認證問題
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
  before_script:
    # 如果你的私有 Registry 需要登入，請在這裡填寫（若無則免）
    # - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY_HOST
    - echo "Starting Docker Build Pipeline..."
    # [等待機制] 確保 Docker Daemon 真的活過來了才往下走
    - |
      echo "⏳ 等待 Docker Daemon 啟動..."
      for i in $(seq 1 30); do
        if docker info >/dev/null 2>&1; then
          echo "✅ Docker Daemon 已成功就緒！"
          break
        fi
        echo "..."
        sleep 1
      done
  script:
    # 定義 Tag 名稱：Main 分支用 Commit SHA，其餘分支用分支 slug 名稱
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA
      else
        IMAGE_TAG=$CI_COMMIT_REF_SLUG
      fi
    - FULL_IMAGE_PATH="$REGISTRY_HOST/$IMAGE_NAME:$IMAGE_TAG"

    # 1. 進行 Docker Build
    - docker build -t $FULL_IMAGE_PATH .

    # 2. 推送到私有 Registry
    - docker push $FULL_IMAGE_PATH

    # 3. 同時留下一份帶有最新 Commit SHA 的 Tag 作為版本歷史追蹤紀錄
    - docker tag $FULL_IMAGE_PATH "$REGISTRY_HOST/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - docker push "$REGISTRY_HOST/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


