# ==========================================
# 階段任務 (Stages)
# ==========================================
stages:
  - lint       # 程式碼品質與靜態檢查
  - test       # 單元測試與整合測試
#  - build      # 打包成 Docker 映像檔並推送到 Registry
#  - deploy     # 部署到測試或生產環境


# ==========================================
# 全局全域設定 (Global Settings)
# ==========================================
variables:
  # 指定 Python 基礎映像檔版本
  PYTHON_IMAGE: "python:3.12-slim"

  # 指定 Docker-in-Docker 版本（Build 階段使用）
  DOCKER_IMAGE: "airflow-dags:v1"
  DOCKER_DIND_IMAGE: "airflow-dags:v1-dind"

  # 專案映像檔名稱
  IMAGE_NAME: "airflow-dags"

  # 透過 GitLab 變數控管 Registry 位址，預設可先給定本地或測試環境 IP
  REGISTRY_HOST: "127.0.0.1:5100"


# ==========================================
# 定義全域快取: 避免每個 Job 都要重新 pip install
# ==========================================
cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip
    - venv/


# ==========================================
# 1. Lint Stage (程式碼品質把關)
# ==========================================
lint:python:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - python -V
    # 安裝 pre-commit（被快取，下次速度極快）
    - pip install pre-commit

  script:
    # 1. pre-commit 內部需要 git 指令來判斷哪些檔案有改動
    - which git || (apt-get update && apt-get install -y git)
    # 2. 執行 pre-commit 檢查所有檔案
    - pre-commit run --all-files

  allow_failure: false # 若檢查不通過，直接阻斷後續 Pipeline

# ==========================================
# 2. Test Stage (自動化測試)
# ==========================================
test:unit:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    # 確保系統裝有 sqlite（Airflow 測試必備底層依賴）
    - apt-get update && apt-get install -y sqlite3 libsqlite3-dev
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pytest pytest-cov
  script:
    # 1. 設定 PYTHONPATH 使測試腳本找得到 dags
    - export PYTHONPATH=.:dags

    # 2. 讓 Airflow 在測試時使用當前目錄作為主目錄，避免去污染系統路徑
    - export AIRFLOW_HOME=$(pwd)/.airflow

    # 3. 執行 pytest 測試 tests/ 目錄
    - pytest --cov=dags tests/ --cov-report=term-missing

  coverage: '/(?i)total.*?([\d\.]+)%/'
  artifacts:
    name: "coverage-report-$CI_COMMIT_REF_NAME"
    paths:
      - htmlcov/ # 如果 pytest 沒產生，可以先註解掉或保留

    expire_in: 1 week

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

