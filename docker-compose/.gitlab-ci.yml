stages:
  - lint       # 程式碼品質與靜態檢查
  - test       # 單元測試與整合測試
#  - build      # 打包成 Docker 映像檔並推送到 Registry
#  - deploy     # 部署到測試或生產環境

# ==========================================
# 全局全域設定 (Global Settings)
# ==========================================
variables:
  # 指定 Python 基礎映像檔版本
  PYTHON_IMAGE: "python:3.12-slim"

  # 指定 Docker-in-Docker 版本（Build 階段使用）
  DOCKER_IMAGE: "airflow_dags:v1"
  DOCKER_DIND_IMAGE: "airflow_dags:v1-dind"

  # 專案映像檔名稱
  IMAGE_NAME: "airflow_dags"

  # 透過 GitLab 變數控管 Registry 位址，預設可先給定本地或測試環境 IP
  REGISTRY_HOST: "127.0.0.1:5100"

# 定義全域快取，避免每個 Job 都要重新 pip install
cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip
    - venv/

# ==========================================
# 1. Lint Stage (程式碼品質把關)
# ==========================================
lint:python:
  stage: lint
  image: $PYTHON_IMAGE
  before_script:
    - python -V
    - pip install --cache-dir .cache/pip flake8 black
  script:
    # 使用 black 檢查排版是否符合規範 (--check 不會直接修改檔案)
    - black --check dags/
    # 使用 flake8 進行語法與潛在 Bug 檢查 (忽略排版衝突，專注在語法錯誤)
    - flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
  allow_failure: false # 若檢查不通過，直接阻斷後續 Pipeline

# ==========================================
# 2. Test Stage (自動化測試)
# ==========================================
test:unit:
  stage: test
  image: $PYTHON_IMAGE
  before_script:
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pytest pytest-cov
  script:
    # 執行測試並輸出覆蓋率報告 (Coverage Report)
    - export PYTHONPATH=src
    - pytest --cov=src tests/ --cov-report=term-missing || echo "請在專案中建立 tests/ 目錄並撰寫測試"
  coverage: '/(?i)total.*?([\d\.]+)%/'
  artifacts:
    name: "coverage-report-$CI_COMMIT_REF_NAME"
    paths:
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"' # MR 時強制執行
    - if: '$CI_COMMIT_BRANCH == "main"'                # Main 分支更動時執行
    - if: '$CI_COMMIT_BRANCH == "develop"'             # Develop 分支更動時執行

